[package]
name = "cel-brief"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Per-turn LLM briefing layer. Assemble memory, perception, history, tools, and user message into a single budgeted, governed, receipted bundle from pluggable streams."
keywords = ["ai", "llm", "agent", "context", "prompt"]
categories = ["asynchronous"]
readme = "README.md"

[dependencies]
async-trait = "0.1"
cel-memory = { path = "../cel-memory", optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true

[features]
default = []
memory = ["dep:cel-memory"]
perception = []

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "sync", "time"] }
